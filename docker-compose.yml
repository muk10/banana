version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: zakat-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: zakat-platform

  backend:
    build:
      context: ./backend-server-app
      dockerfile: Dockerfile
    container_name: zakat-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/zakat-platform
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-key}
      JWT_EXPIRE: 30d
      CLOUDINARY_NAME: ${CLOUDINARY_NAME}
      CLOUDINARY_KEY: ${CLOUDINARY_KEY}
      CLOUDINARY_SECRET: ${CLOUDINARY_SECRET}
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongodb
    volumes:
      - ./backend-server-app/logs:/app/logs

  frontend:
    build:
      context: ./client-react-app
      dockerfile: Dockerfile
    container_name: zakat-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api

volumes:
  mongodb_data:

